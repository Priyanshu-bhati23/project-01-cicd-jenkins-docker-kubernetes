name: microservices-ci-cd

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY || 'ghcr.io/your-org/devops-microservices' }}
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: azure/setup-helm@v3
        with:
          version: "latest"
      - name: Compile Python services
        run: python -m compileall apps
      - name: Render Helm chart
        run: helm template demo helm/microservices
      - name: Build catalog image
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/catalog:${{ env.IMAGE_TAG }} apps/catalog
      - name: Build orders image
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/orders:${{ env.IMAGE_TAG }} apps/orders

  push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Push catalog image
        run: docker push ${{ env.IMAGE_REGISTRY }}/catalog:${{ env.IMAGE_TAG }}
      - name: Push orders image
        run: docker push ${{ env.IMAGE_REGISTRY }}/orders:${{ env.IMAGE_TAG }}

  deploy:
    needs: push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
        with:
          version: "latest"
      - uses: azure/setup-helm@v3
        with:
          version: "latest"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install demo helm/microservices \
            --namespace demo --create-namespace \
            --set image.registry=${{ env.IMAGE_REGISTRY }} \
            --set image.tag=${{ env.IMAGE_TAG }}

